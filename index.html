<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Irregular Verbs Quiz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f5f9;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .quiz-container {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .verb {
            font-size: 28px;
            text-align: center;
            margin: 25px 0;
            color: #0077cc;
            font-weight: bold;
        }

        .inputs {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #0077cc;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #005fa3;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .score {
            margin-top: 20px;
            text-align: center;
            color: #444;
        }

        .correct {
            color: green;
        }

        .incorrect {
            color: red;
        }

        .nextAdvertisement {
            margin-top: 20px;
            text-align: center;
            font-size: 16px;
            color: #d35400;
            font-weight: bold;
            min-height: 24px;
        }

        .nextAdvertisement.blinking {
            animation: blink 1s steps(2, start) infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

    <div class="quiz-container">
        <h1>Irregular Verbs Quiz</h1>

        <div class="verb" id="baseVerb">go</div>

        <div class="inputs">
            <input type="text" id="pastSimple" placeholder="Past Simple">
            <input type="text" id="pastParticiple" placeholder="Past Participle">
        </div>

        <button id="checkButton" onclick="checkAnswer()" disabled>Check</button>

        <div class="result" id="result"></div>
        <div class="score" id="score">Score: 0 / 0</div>
        <div class="nextAdvertisement" id="nextAdvertisement"></div>
    </div>

        let currentVerb = {};
        let correctAnswers = 0;
        let totalQuestions = 0;

        function updateButtonState() {
            const hasPast = document.getElementById("pastSimple").value.trim().length > 0;
            const hasParticiple = document.getElementById("pastParticiple").value.trim().length > 0;
            document.getElementById("checkButton").disabled = !(hasPast && hasParticiple);
        }

        function randomVerb() {
            randomNumber = Math.random();
            currentVerb = verbs[Math.floor(randomNumber * verbs.length)];
            console.log(currentVerb, randomNumber, verbs.length);

            document.getElementById("baseVerb").textContent = currentVerb.base;

            document.getElementById("pastSimple").value = "";
            document.getElementById("pastParticiple").value = "";

            document.getElementById("result").textContent = "";
            document.getElementById("result").className = "result";
            document.getElementById("nextAdvertisement").textContent = "";
            document.getElementById("nextAdvertisement").classList.remove("blinking");
            updateButtonState();
        }

        function checkAnswer() {
            const userPast = document.getElementById("pastSimple").value.trim().toLowerCase();
            const userParticiple = document.getElementById("pastParticiple").value.trim().toLowerCase();

            totalQuestions++;

            const correctPast = currentVerb.past;
            const correctParticiple = currentVerb.participle;

            if (userPast === correctPast && userParticiple === correctParticiple) {
                correctAnswers++;
                document.getElementById("result").textContent = "✅ Correct!";
                document.getElementById("result").classList.add("correct");
            } else {
                document.getElementById("result").innerHTML = `❌ Wrong<br>Past Simple: <b>${correctPast}</b><br>Past Participle: <b>${correctParticiple}</b>`;
                document.getElementById("result").classList.add("incorrect");
            }

            document.getElementById("score").textContent = `Score: ${correctAnswers} / ${totalQuestions}`;

            const nextAd = document.getElementById("nextAdvertisement");
            nextAd.textContent = "Heads up! The next one is coming soon...";
            nextAd.classList.add("blinking");

            setTimeout(randomVerb, 2500);
        }

        document.getElementById("pastSimple").addEventListener("input", updateButtonState);
